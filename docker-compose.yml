version: "3.9"

services:

  backend:
    build: ./backend
    container_name: prescripto_backend
    ports:
      - "4000:4000"
    environment:
      - MONGODB_URI=mongodb://mongo:27017/prescripto
    depends_on:
      - mongo

  frontend:
    build: ./Frontend
    container_name: prescripto_frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_BACKEND_URL=http://backend:4000
    depends_on:
      - backend

  admin:
    build: ./admin
    container_name: prescripto_admin
    ports:
      - "5174:5174"
    environment:
      - VITE_BACKEND_URL=http://backend:4000
    depends_on:
      - backend

  mongo:
    image: mongo:6
    container_name: prescripto_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
